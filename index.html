<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eventbooze — Plan the moment. Own the night.</title>
  <meta name="description" content="We're building something that changes how events are planned, booked and experienced." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #0d3028 0%, #071a14 60%, #040e0b 100%);
      color: #e8f5f0;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow-x: hidden;
      overflow-y: auto;
    }

    main {
      text-align: center;
      padding: 40px 24px 80px;
      max-width: 700px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    /* Logo */
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 56px;
    }
    .logo-icon {
      width: 64px;
      height: 64px;
      flex-shrink: 0;
      filter: drop-shadow(0 4px 16px rgba(62, 207, 142, 0.3));
    }
    .logo-text { text-align: left; }
    .logo-name {
      font-family: 'Playfair Display', serif;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .logo-name .word-event { color: #e8f5f0; }
    .logo-name .word-booze { color: #3ecf8e; }
    .logo-tagline {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      color: #7ab99a;
      font-style: italic;
      margin-top: 5px;
    }

    /* Divider label */
    .label {
      display: flex;
      align-items: center;
      gap: 16px;
      justify-content: center;
      margin-bottom: 32px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 3px;
      color: #4db88a;
      text-transform: uppercase;
    }
    .label::before, .label::after {
      content: '';
      flex: 1;
      max-width: 60px;
      height: 1px;
      background: #4db88a;
      opacity: 0.6;
    }

    /* Headline */
    h1 {
      font-family: 'Inter', sans-serif;
      font-size: clamp(44px, 9vw, 80px);
      font-weight: 800;
      line-height: 1.05;
      color: #fff;
      margin-bottom: 8px;
    }
    h1 em {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: #3ecf8e;
      font-weight: 700;
    }

    /* Sub copy */
    .sub {
      margin: 36px auto 0;
      max-width: 460px;
      font-size: 13px;
      font-weight: 300;
      line-height: 1.8;
      color: #7aab94;
      letter-spacing: 0.2px;
    }
    .sub strong { color: #b0d9c8; font-weight: 400; }

    /* Perfect for — ticker block */
    .ticker-block {
      margin: 40px auto 40px;
    }
    .ticker-block .label {
      margin-bottom: 18px;
    }
    .ticker-slot {
      position: relative;
      overflow: hidden;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ticker-text {
      font-size: 19px;
      font-weight: 600;
      color: #e8f5f0;
      letter-spacing: 0.2px;
      text-align: center;
      display: block;
      transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.42s ease;
    }
    .ticker-text.exit {
      transform: translateY(-120%);
      opacity: 0;
    }
    .ticker-text.enter {
      transform: translateY(120%);
      opacity: 0;
      transition: none;
    }

    /* Follow label */
    .follow-label { margin-bottom: 28px; }

    /* Social + contact links */
    .links {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover { transform: translateY(-3px); }

    .btn-instagram,
    .btn-linkedin,
    .btn-email {
      background: rgba(62, 207, 142, 0.07);
      color: #7aab94;
      border: 1px solid rgba(62, 207, 142, 0.2);
    }
    .btn-instagram:hover,
    .btn-linkedin:hover,
    .btn-email:hover {
      background: rgba(62, 207, 142, 0.14);
      color: #3ecf8e;
      border-color: rgba(62, 207, 142, 0.4);
      box-shadow: 0 4px 16px rgba(62, 207, 142, 0.15);
    }

    svg.icon { width: 22px; height: 22px; fill: currentColor; flex-shrink: 0; }

    /* Starry canvas background */
    #stars-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 1.5px;
      color: #4a7a62;
      text-transform: lowercase;
      z-index: 10;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      body {
        justify-content: flex-start;
      }
      main {
        padding: 48px 20px 60px;
      }
      .ticker-slot { height: 32px; }
      .ticker-text { font-size: 16px; }
      .logo { margin-bottom: 40px; }
      .sub { margin: 24px auto 0; }
      .ticker-block { margin: 28px auto 28px; }
    }
  </style>
</head>
<body>

    <div class="label">Something big is coming</div>

  <script>
    /* ── Glitter burst from centre ── */
    (function () {
      const canvas = document.getElementById('stars-canvas');
      const ctx    = canvas.getContext('2d');
      let W, H, cx, cy;
      const particles = [];
      const POOL = 140;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
        cx = W / 2;
        cy = H / 2;
      }

      function spawn() {
        const angle  = Math.random() * Math.PI * 2;
        const speed  = 0.4 + Math.random() * 1.1;
        const isSpark = Math.random() < 0.38;
        const green   = Math.random() < 0.25;
        return {
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: isSpark ? 0.5 + Math.random() * 0.9 : 0.2 + Math.random() * 0.5,
          isSpark,
          green,
          maxAge: 160 + Math.random() * 240,
          frame: 0,
          peak: 0.18 + Math.random() * 0.22,
          spin: (Math.random() - 0.5) * 0.08,
          angle: Math.random() * Math.PI,
        };
      }

      for (let i = 0; i < POOL; i++) {
        const p = spawn();
        p.frame = Math.random() * p.maxAge;
        p.x = cx + p.vx * p.frame;
        p.y = cy + p.vy * p.frame;
        particles.push(p);
      }

      function drawSpark(x, y, sz, a, angle, green) {
        const arm   = sz * 4.5;
        const waist = sz * 0.28;
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.shadowColor = green ? '#3ecf8e' : '#c8ffe0';
        ctx.shadowBlur  = sz * 8;
        ctx.fillStyle   = green ? `rgba(62,207,142,${a})` : `rgba(220,255,240,${a})`;
        ctx.beginPath();
        ctx.moveTo(0,    -arm);
        ctx.quadraticCurveTo( waist, -waist,  arm, 0);
        ctx.quadraticCurveTo( waist,  waist,  0,   arm);
        ctx.quadraticCurveTo(-waist,  waist, -arm, 0);
        ctx.quadraticCurveTo(-waist, -waist,  0,  -arm);
        ctx.fill();
        ctx.restore();
      }

      function drawDot(x, y, sz, a, green) {
        ctx.save();
        ctx.shadowColor = green ? '#3ecf8e' : '#b0ffd8';
        ctx.shadowBlur  = sz * 4;
        ctx.beginPath();
        ctx.arc(x, y, sz, 0, Math.PI * 2);
        ctx.fillStyle = green ? `rgba(62,207,142,${a})` : `rgba(210,255,235,${a})`;
        ctx.fill();
        ctx.restore();
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        for (const p of particles) {
          p.frame++;
          p.x += p.vx;
          p.y += p.vy;
          p.angle += p.spin;

          if (p.frame >= p.maxAge) {
            Object.assign(p, spawn());
            continue;
          }

          const t = p.frame / p.maxAge;
          let a;
          if      (t < 0.15) a = t / 0.15;
          else if (t < 0.6)  a = 1;
          else               a = 1 - (t - 0.6) / 0.4;
          a *= p.peak;

          if (p.isSpark) drawSpark(p.x, p.y, p.size, a, p.angle, p.green);
          else           drawDot(p.x, p.y, p.size, a, p.green);
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', resize);
      resize();
      requestAnimationFrame(draw);
    })();

    /* ── Event type ticker ── */
    (function () {
      const events = [
        'Birthday parties 🎂',
        'Anniversaries ❤️',
        'House parties 🍻',
        'Get-togethers 👥',
        'Farewell parties 👋',
        'Reunion (school/college) 🎓',
        'Baby showers 👶',
        'Naming ceremonies 👶',
        'Engagement ceremonies 💍',
        'Weddings 💒',
        'Reception 💐',
        'Mehendi / Haldi 🌿',
        'Sangeet 🎶',
        'Bachelor / Bachelorette parties 🥂',
        'Proposal events 💖',
      ];
      const el = document.getElementById('ticker-text');
      let idx = 0;

      function next() {
        el.classList.add('exit');
        setTimeout(() => {
          idx = (idx + 1) % events.length;
          el.textContent = events[idx];
          el.classList.remove('exit');
          el.classList.add('enter');
          requestAnimationFrame(() => requestAnimationFrame(() => el.classList.remove('enter')));
        }, 420);
      }

      setInterval(next, 2200);
    })();
  </script>
